name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake --preset default

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: x4native-bin
          path: |
            native/x4native_64.dll
            native/x4native_core.dll
          retention-days: 7
